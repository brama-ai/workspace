apiVersion: v1
kind: Secret
metadata:
  name: brama-secrets
  namespace: brama
  labels:
    app.kubernetes.io/part-of: brama
    app.kubernetes.io/component: config
type: Opaque
# NOTE: Values below are base64-encoded defaults for local development only.
# Replace with real secrets before any non-local deployment.
# Generate encoded values: echo -n 'value' | base64
#
# Mapping from .env.deployment.example:
#   POSTGRES_USER          → postgres_user
#   POSTGRES_PASSWORD      → postgres_password
#   RABBITMQ_USER          → rabbitmq_user
#   RABBITMQ_PASSWORD      → rabbitmq_password
#   EDGE_AUTH_JWT_SECRET   → edge_auth_jwt_secret
#   LITELLM_API_KEY        → litellm_api_key
#   LANGFUSE_PUBLIC_KEY    → langfuse_public_key
#   LANGFUSE_SECRET_KEY    → langfuse_secret_key
#   TURNSTILE_SECRET_KEY   → turnstile_secret_key
#   APP_INTERNAL_TOKEN     → app_internal_token
stringData:
  # ── Database credentials ───────────────────────────────────────────────────
  # Source: POSTGRES_USER, POSTGRES_PASSWORD in .env.deployment.example
  POSTGRES_USER: "app"
  POSTGRES_PASSWORD: "app"

  # ── RabbitMQ credentials ───────────────────────────────────────────────────
  # Source: RABBITMQ_USER, RABBITMQ_PASSWORD in .env.deployment.example
  RABBITMQ_USER: "app"
  RABBITMQ_PASSWORD: "app"
  RABBITMQ_URL: "amqp://app:app@rabbitmq:5672"

  # ── Edge Auth JWT secret ───────────────────────────────────────────────────
  # Source: EDGE_AUTH_JWT_SECRET in .env.deployment.example
  EDGE_AUTH_JWT_SECRET: "dev-edge-auth-secret-change-me"

  # ── LiteLLM API key ────────────────────────────────────────────────────────
  # Source: LITELLM_API_KEY in .env.deployment.example
  LITELLM_API_KEY: "dev-key"

  # ── Langfuse keys ──────────────────────────────────────────────────────────
  # Source: LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY in .env.deployment.example
  LANGFUSE_PUBLIC_KEY: "lf_pk_local_dev"
  LANGFUSE_SECRET_KEY: "lf_sk_local_dev"

  # ── Cloudflare Turnstile secret ────────────────────────────────────────────
  # Source: TURNSTILE_SECRET_KEY in .env.deployment.example
  TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"

  # ── Internal token ─────────────────────────────────────────────────────────
  # Source: APP_INTERNAL_TOKEN in .env.deployment.example
  APP_INTERNAL_TOKEN: "dev-internal-token"
