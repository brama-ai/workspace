apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-agent
  namespace: brama
  labels:
    app.kubernetes.io/part-of: brama
    app.kubernetes.io/component: agent
    app.kubernetes.io/name: hello-agent
    ai.platform.agent: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: brama
        app.kubernetes.io/component: agent
        app.kubernetes.io/name: hello-agent
        ai.platform.agent: "true"
    spec:
      containers:
        - name: hello-agent
          image: ghcr.io/nmdimas/a2a-hello-agent:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: brama-config
            - secretRef:
                name: brama-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
