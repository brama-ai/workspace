services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    user: vscode
    env_file:
      - path: ../.env.local
        required: false
    volumes:
      - ..:/workspaces/brama:cached
      - commandhistory:/commandhistory
      - ${HOME}/.antigravity-server:/home/vscode/.antigravity-server:cached
      - ${HOME}/.vscode-server:/home/vscode/.vscode-server:cached
      - ${HOME}/.claude:/home/vscode/.claude:cached
      - ${HOME}/.codex:/home/vscode/.codex:cached
      - ${HOME}/.cursor:/home/vscode/.cursor:cached
      - ${HOME}/.gemini:/home/vscode/.gemini:cached
      - ${HOME}/.config/opencode:/home/vscode/.config/opencode:cached
      - ${HOME}/.config/Cursor:/home/vscode/.config/Cursor:cached
      - ${HOME}/.local/share/opencode:/home/vscode/.local/share/opencode:cached
      - ${HOME}/.npm:/home/vscode/.npm:cached
      - ${HOME}/.bun:/home/vscode/.bun:cached
      - ${HOME}/.gitconfig:/home/vscode/.gitconfig:ro
      - ${HOME}/.ssh:/home/vscode/.ssh:cached
      # Kubernetes access (kubeconfig from host)
      - ${HOME}/.kube:/home/vscode/.kube:cached
      # Docker-in-Docker support
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "langfuse.localhost:host-gateway"
      - "langfuse.brama.localhost:host-gateway"
      - "langfuse.dev.internal:host-gateway"
    environment:
      - HOME=/home/vscode
      # Claude Code permissions are managed via project-level settings.json (see post-start.sh)
      - DOCKER_HOST=unix:///var/run/docker.sock
      - KUBECONFIG=/home/vscode/.kube/config.devcontainer
      - HISTSIZE=50000
      - HISTFILESIZE=50000
      - SAVEHIST=50000
    command:
      - /bin/sh
      - -lc
      - >
        mkdir -p /commandhistory /home/vscode/.antigravity-server /home/vscode/.vscode-server /home/vscode/.local /home/vscode/.local/state /home/vscode/.local/share /home/vscode/.config /home/vscode/.claude /home/vscode/.codex /home/vscode/.cursor /home/vscode/.gemini /home/vscode/.npm /home/vscode/.bun /home/vscode/.config/Cursor /home/vscode/.config/opencode
        && touch /commandhistory/.bash_history /commandhistory/.zsh_history
        && chown vscode:vscode /commandhistory /commandhistory/.bash_history /commandhistory/.zsh_history /home/vscode/.antigravity-server /home/vscode/.vscode-server /home/vscode/.local /home/vscode/.local/state /home/vscode/.local/share /home/vscode/.config /home/vscode/.claude /home/vscode/.codex /home/vscode/.cursor /home/vscode/.gemini /home/vscode/.npm /home/vscode/.bun /home/vscode/.config/Cursor /home/vscode/.config/opencode || true
        && exec sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev-edge
      - agents-internal

volumes:
  commandhistory:
