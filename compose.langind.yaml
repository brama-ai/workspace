services:
  langind:
    build:
      context: ./langind
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=brama_dev-edge
      - traefik.http.routers.langind.rule=Host(`localhost`)
      - traefik.http.routers.langind.entrypoints=landing
      - traefik.http.routers.langind.service=langind
      - traefik.http.services.langind.loadbalancer.server.port=80
    networks:
      - dev-edge

networks:
  dev-edge:
    external: false
